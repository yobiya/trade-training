[project]
name = "market-data"
version = "0.0.0"
description = "市場データ取得ライブラリ(ハイブリッドキャッシュ)"
requires-python = ">=3.13"
dependencies = [
    "shared-schema",
    "pandas>=2.2",
    "sqlalchemy>=2.0",
]

[project.optional-dependencies]
mt5 = [
    "MetaTrader5>=5.0 ; sys_platform == 'win32'",
]

[project.scripts]
market-data = "market_data.cli:main"

[tool.uv.sources]
shared-schema = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/market_data"]

[project]
name = "shared-schema"
version = "0.0.0"
description = "共有 DB スキーマ定義・マイグレーション"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_schema"]

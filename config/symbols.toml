# 銘柄定義(仕様書 §2.4 / §2.8 / §3 / §3.1)
#
# 真実の所有者: 本ファイル。コード側は banner / lookup でのみ参照する。
# 新 broker への切替・新銘柄追加・alias 追加・spread 調整は本ファイルの編集だけで完結する。
#
# フィールド:
#   category          : "fx" | "metal" | "crypto_btc" | "crypto_eth" | "index"
#                       (services/symbols.py:derive_pip_size の補正カテゴリ)
#   spread_pips       : 暫定スプレッド(MT5 デモ接続後に実測値で上書き、§3)
#   pip_size_fallback : MT5 不通時の pip サイズ(broker 一般慣行値、§3.1)
#   aliases           : broker 実シンボル候補(完全一致 → startswith マッチ順、§2.4)
#                       省略時は code 自体のみを試す
#   default_active    : 初回 seed 時に Setting.symbols へ含めるか(省略時 true)

# ---------------------------------------------------------------------------
# FX: メジャー 8 通貨の全 28 ペア(§2.8)
# ---------------------------------------------------------------------------


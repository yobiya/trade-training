# ---------------------------------------------------------------------------
# 商品(§2.8)
# broker により命名が異なる場合 aliases を使用。例: 一部 broker は XAUUSD ではなく
# GOLD#、XAGUSD ではなく SILVER# という名前で持つ。
# ---------------------------------------------------------------------------

# 貴金属
[symbols.XAUUSD]
category = "metal"
spread_pips = 3.0
pip_size_fallback = 0.1
aliases = ["XAUUSD", "GOLD", "XAU/USD"]

[symbols.XAGUSD]
category = "metal"
spread_pips = 3.0
pip_size_fallback = 0.01
aliases = ["XAGUSD", "SILVER", "XAG/USD"]

